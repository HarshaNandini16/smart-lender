{% extends 'layout.html' %}

{% block title %}Forgot Password - Smart Lender{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="glass-card p-5 border-0 shadow-lg" style="max-width: 450px; width: 100%;" data-aos="zoom-in">
            <div class="text-center mb-4">
                <i class="fas fa-key fa-3x text-gradient mb-3"></i>
                <h3 class="fw-bold text-white">Reset Password</h3>
                <p class="text-secondary small">Enter your email and we'll simulate sending a reset link</p>
            </div>
            
            <form action="{{ url_for('routes.forgot_password') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label text-secondary small">Email Address</label>
                    <input type="email" name="email" class="form-control bg-dark border-secondary text-white" placeholder="john@domain.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary-grad w-100 py-2.5 rounded-pill mb-3">Request Reset</button>
            </form>
            
            <div class="text-center">
                <a href="{{ url_for('routes.login') }}" class="text-primary text-decoration-none small fw-bold"><i class="fas fa-chevron-left me-1"></i>Back to Sign In</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
